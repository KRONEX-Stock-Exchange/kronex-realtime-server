services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_PASSWORD:-1234}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../kronex-server
    env_file: .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-1234}@mysql:3306/${MYSQL_DATABASE:-stock}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
    volumes:
      - ../kronex-server/src:/app/src:ro
      - ../kronex-server/tsconfig.json:/app/tsconfig.json:ro
    ports:
      - "${SERVER_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  engine:
    build:
      context: ../kronex-engine
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      RABBITMQ_HOST: rabbitmq
      WAL_DIR: /data/wal
    volumes:
      - engine-wal:/data/wal
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_healthy

  realtime-server:
    build:
      context: .
    env_file: .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-1234}@mysql:3306/${MYSQL_DATABASE:-stock}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
      REALTIME_SERVER_PORT: 3001
    ports:
      - "${REALTIME_SERVER_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3001,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_healthy

volumes:
  mysql-data:
  engine-wal:
